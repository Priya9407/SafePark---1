{% block mainblock %}
<div class="d-flex flex-column justify-content-center align-items-center"><div class="p-2 mt-lg-3 mb-5 bg2 row "> 
<form action="{{url_for('main.new_lot',role=current_user.role, username=current_user.username)}}" method="POST" class="p-3 p-sm-5">

   <h3 class="pb-4">New Lot</h3>
   <div class="mb-3 row">
    <label for="lot_id" class="col-sm-5 col-form-label">Lot Id </label>
    <div class="col-sm-7">
      <input type="text" class="form-control" id="lot_id" disabled value="{{new_id}}" name="lot_id">
    </div>
  </div>
  <div class="mb-3 row">
    <label for="lot_loc" class="col-sm-5 col-form-label">Location </label>
    <div class="col-sm-7">
      <input type="text" class="form-control" id="lot_loc" required name="name">
    </div>
  </div>
  
  


  <div class="mb-3 row">
    <label for="address" class="col-sm-5 col-form-label">Address</label>
     <div class="col-sm-7">
      <textarea type="textarea" rows="3" class="form-control" id="address" name="address">
    </textarea>
    </div>
  </div>

  <div class="mb-3 row">
    <label for="pincode" class="col-sm-5 col-form-label">Pincode</label>
    <div class="col-sm-7">
      <input type="text" class="form-control" id="pincode" required name="pin_code">
    </div>
  </div>
  <div class="mb-3 row">
    <label for="price" class="col-sm-5 col-form-label">Price (₹)</label>
    <div class="col-sm-7">
      <input type="text"  class="form-control"  id="price" required name="price">
      
    </div>
  </div>
  
  <div class="mb-3 row">
    <label for="max_spots" class="col-sm-5 col-form-label">Max spots</label>
    <div class="col-sm-7">
      <input type="text"class="form-control" id="max_spots"  name="max_spots" required>
    </div>
  </div>
  <div class="d-flex p-4 justify-content-center"><div class="mx-2">
    <button type="submit" class="btn btn-warning">Add</button></div>
    <div class="mx-2">
    <a class="btn btn-danger" href="{{url_for('main.lots',username=current_user.username,role=current_user.role)}}" role="button">Back</a></div></div>

</form>
</div>
</div>

{% endblock %}
